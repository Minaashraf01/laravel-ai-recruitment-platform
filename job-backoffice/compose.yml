services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    ports:
      - "3311:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: sh8lne
      MARIADB_USER: training_user
      MARIADB_PASSWORD: training_pass
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "8083:80"

volumes:
  mariadb_data:
